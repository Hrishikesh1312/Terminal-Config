"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

[character]
success_symbol = "[вқҜ ](bold green)"
error_symbol = "[вқҜ ](bold red)"

[os]
disabled = false
# format = "[оӮ¶](fg:blue)[$symbol](bg:blue fg:black)[оӮҙ](fg:blue)"
format = "$symbol"

[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style)'
disabled = false
show_always = true
aliases = { "corpuser034g" = "matchai" }

[hostname]
ssh_only = false
format = '[$ssh_symbol](bold blue)@[$hostname](bold #E95420) '
trim_at = '.companyname.com'
disabled = false

[os.symbols]
Arch = "[пҢғ ](fg:bright-blue)"
Debian = "[пҢҶ ](fg:red)"
EndeavourOS = "[пҢў ](fg:purple)"
Fedora = "[пҢҠ ](fg:blue)"
NixOS = "[пҢ“ ](fg:bright-white)"
openSUSE = "[пҢ” ](fg:green)"
SUSE = "[пҢ” ](fg:green)"
Ubuntu = "[оҪІ ](fg:#E95420)"

[directory]
format = "[оӮ¶](fg:bright-black)[$path](bg:bright-black fg:white)[оӮҙ](fg:bright-black) "
read_only = " оӮў "
truncation_length = 4
truncation_symbol = "~/вҖҰ/"
truncate_to_repo = true

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Videos" = "пҖҪ "
"Projects" = "уұҢў "
"School" = "у°‘ҙ "
"www" = "оңҘ"
".config" = "пҗЈ "

[git_branch]
symbol = "оӮ "
style = "bg:bright-black fg:white"
format = "[оӮ¶](fg:bright-black)[on $symbol$branch(:$remote_branch)]($style)[оӮҙ](fg:bright-black) "
truncation_length = 20

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[java]
symbol = "оңё "

[python]
symbol = "оңј "
format = 'via [${symbol}(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
disabled = true
style = "bold red"
format = " via [$symbol]($style)"


[nodejs]
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]
symbol = "оһҒ "
style = "bold yellow"
format = "via [$symbol]($style)"

[package]
disabled = true

[aws]
disabled = true
format = 'on [$symbol$region]($style) '
style = 'bold yellow'
symbol = 'вҳҒпёҸ '
[aws.region_aliases]
ap-southeast-2 = ' (au-2)'
us-east-1 = ' (ue-1)'
